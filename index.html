<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorie dynamiczne</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f4; }
        h1 { text-align: center; }
        ul.categories { list-style: none; padding: 0; display: flex; flex-wrap: wrap; justify-content: center; }
        ul.categories li { background: #fff; margin: 10px; padding: 20px; border-radius: 8px;
                            box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.2s; }
        ul.categories li:hover { transform: scale(1.05); }
        a { text-decoration: none; color: inherit; display: block; }
    </style>
</head>
<body>
    <h1>Kategorie</h1>
    <ul class="categories" id="categoryList"></ul>

    <script>
        async function loadCategories() {
            try {
                const response = await fetch('suite.map');
                if (!response.ok) throw new Error('Nie można załadować suite.map');
                const data = await response.json();
                const list = document.getElementById('categoryList');

                data.categories.forEach(cat => {
                    const li = document.createElement('li');
                    const link = document.createElement('a');
                    link.href = `category.html?cat=${encodeURIComponent(cat.id)}`;
                    link.textContent = cat.name;
                    li.appendChild(link);
                    list.appendChild(li);
                });
            } catch (err) {
                console.error(err);
            }
        }

        loadCategories();
    </script>
</body>
</html>
